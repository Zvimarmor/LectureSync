<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Synchronized dual-media player for playing separate video and audio lecture files in perfect sync." />
  <title>Lecture Sync Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a26;
      --bg-card-hover: #22223a;
      --bg-control: #1e1e2e;
      --surface-glass: rgba(255, 255, 255, 0.03);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --accent: #6c5ce7;
      --accent-light: #a78bfa;
      --accent-glow: rgba(108, 92, 231, 0.25);
      --accent-gradient: linear-gradient(135deg, #6c5ce7, #a78bfa);
      --success: #00cec9;
      --warning: #fdcb6e;
      --danger: #ff6b6b;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 30px var(--accent-glow);
      --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      --transition-spring: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
      --font-en: 'Inter', system-ui, -apple-system, sans-serif;
      --font-he: 'Heebo', 'Inter', system-ui, sans-serif;
    }

    html {
      font-family: var(--font-en);
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html, body {
      height: 100vh;
      overflow: hidden;
    }

    html[dir="rtl"] {
      font-family: var(--font-he);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(108, 92, 231, 0.08), transparent),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(167, 139, 250, 0.05), transparent),
        var(--bg-primary);
    }

    /* ===== Header ===== */
    .header {
      width: 100%;
      padding: 10px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      background: rgba(10, 10, 15, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      flex-shrink: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      background: var(--accent-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: var(--shadow-glow);
    }

    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 100px;
      padding: 5px 6px;
      cursor: pointer;
      transition: var(--transition-smooth);
      user-select: none;
    }

    .lang-toggle:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
    }

    .lang-option {
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: var(--transition-fast);
    }

    .lang-option.active {
      background: var(--accent-gradient);
      color: #fff;
      box-shadow: var(--shadow-glow);
    }

    /* ===== Main Layout ===== */
    .app-container {
      width: 100%;
      max-width: 1100px;
      padding: 12px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ===== File Inputs ===== */
    .file-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      .file-inputs {
        grid-template-columns: 1fr;
      }
    }

    .file-drop {
      position: relative;
      border: 2px dashed var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition-smooth);
      background: var(--surface-glass);
      overflow: hidden;
    }

    .file-drop::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: var(--accent-gradient);
      opacity: 0;
      transition: var(--transition-smooth);
    }

    .file-drop:hover,
    .file-drop.dragover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .file-drop:hover::before,
    .file-drop.dragover::before {
      opacity: 0.04;
    }

    .file-drop.loaded {
      border-color: var(--success);
      border-style: solid;
    }

    .file-drop.loaded::before {
      background: linear-gradient(135deg, #00cec9, #00b894);
      opacity: 0.04;
    }

    .file-drop input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .file-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      position: relative;
      z-index: 1;
      transition: var(--transition-smooth);
    }

    .file-drop.loaded .file-icon {
      background: rgba(0, 206, 201, 0.1);
    }

    .file-label {
      font-weight: 600;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }

    .file-hint {
      font-size: 12px;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
    }

    .file-name {
      font-size: 12px;
      color: var(--success);
      font-weight: 500;
      position: relative;
      z-index: 1;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== Video Player Area ===== */
    .player-area {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 8px;
      overflow: hidden;
    }

    .player-wrapper {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #000;
      box-shadow: var(--shadow-lg);
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player-wrapper video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    /* Resizer Bar */
    .resizer {
      width: 6px;
      cursor: col-resize;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 100px;
      transition: background var(--transition-fast);
      display: none;
      flex-shrink: 0;
      z-index: 10;
    }

    .resizer.visible {
      display: block;
    }

    .resizer:hover, .resizer.dragging {
      background: var(--accent);
    }

    /* Presentation (secondary) video */
    .presentation-wrapper {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #000;
      box-shadow: var(--shadow-lg);
      flex: 1;
      min-height: 0;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .presentation-wrapper.visible {
      display: flex;
    }

    .presentation-wrapper video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .pres-label {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text-secondary);
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 100px;
      z-index: 2;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    html[dir="rtl"] .pres-label {
      left: auto;
      right: 8px;
    }

    .player-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
      position: absolute;
      inset: 0;
      transition: opacity var(--transition-smooth);
    }

    .player-placeholder.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .placeholder-icon {
      font-size: 56px;
      opacity: 0.3;
    }

    .placeholder-text {
      font-size: 15px;
      font-weight: 500;
    }

    /* Overlay play button on video */
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.25);
      cursor: pointer;
      opacity: 0;
      transition: opacity var(--transition-smooth);
      z-index: 5;
    }

    .play-overlay.visible {
      opacity: 1;
    }

    .play-overlay-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      transition: var(--transition-spring);
    }

    .play-overlay:hover .play-overlay-btn {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.18);
    }

    /* ===== Controls ===== */
    .controls-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: var(--transition-smooth);
      opacity: 0.5;
      pointer-events: none;
      flex-shrink: 0;
    }

    .controls-panel.active {
      opacity: 1;
      pointer-events: all;
    }

    /* Seek Bar */
    .seek-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .time-display {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
      min-width: 42px;
      text-align: center;
      white-space: nowrap;
    }

    .seek-bar-container {
      flex: 1;
      position: relative;
      height: 20px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .seek-track {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 100px;
      overflow: hidden;
      position: relative;
      transition: height var(--transition-fast);
    }

    .seek-bar-container:hover .seek-track {
      height: 6px;
    }

    .seek-buffered {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 100px;
      transition: width 200ms linear;
    }

    .seek-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: var(--accent-gradient);
      border-radius: 100px;
      transition: width 80ms linear;
    }

    .seek-thumb {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      transform: translate(-50%, -50%) scale(0);
      box-shadow: 0 0 10px rgba(108, 92, 231, 0.5);
      transition: transform var(--transition-spring);
      pointer-events: none;
    }

    .seek-bar-container:hover .seek-thumb {
      transform: translate(-50%, -50%) scale(1);
    }

    /* Controls Row */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .controls-left,
    .controls-center,
    .controls-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls-center {
      gap: 6px;
    }

    .ctrl-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
      position: relative;
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .ctrl-btn:active {
      transform: scale(0.92);
    }

    .ctrl-btn.primary {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-gradient);
      font-size: 20px;
      box-shadow: var(--shadow-glow);
    }

    .ctrl-btn.primary:hover {
      box-shadow: 0 0 40px var(--accent-glow);
      transform: scale(1.05);
    }

    .ctrl-btn.primary:active {
      transform: scale(0.95);
    }

    /* Skip buttons */
    .skip-label {
      position: absolute;
      bottom: -2px;
      font-size: 8px;
      font-weight: 700;
      color: var(--text-secondary);
    }

    /* Volume */
    .volume-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .volume-slider {
      width: 80px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #6c5ce7 100%, rgba(255, 255, 255, 0.1) 100%);
      border-radius: 100px;
      outline: none;
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(108, 92, 231, 0.5), 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    .volume-slider::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 100px;
    }

    .volume-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px rgba(108, 92, 231, 0.5), 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    .volume-slider::-moz-range-progress {
      background: #6c5ce7;
      border-radius: 100px;
      height: 4px;
    }

    .volume-slider::-moz-range-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      height: 4px;
    }

    /* Playback Rate */
    .rate-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .rate-btn {
      padding: 5px 10px;
      border-radius: 100px;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-fast);
      font-family: inherit;
    }

    .rate-btn:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .rate-btn.active {
      background: var(--accent-gradient);
      border-color: transparent;
      color: #fff;
      box-shadow: var(--shadow-glow);
    }

    /* Fullscreen */
    .fullscreen-btn {
      margin-inline-start: 4px;
    }

    /* Toggle Buttons */
    .toggle-pill-btn {
      padding: 5px 12px;
      border-radius: 100px;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-fast);
      font-family: inherit;
      white-space: nowrap;
    }

    .toggle-pill-btn:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .toggle-pill-btn.active {
      background: var(--accent-gradient);
      border-color: transparent;
      color: #fff;
      box-shadow: var(--shadow-glow);
    }

    /* ===== Status Bar ===== */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px;
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: var(--transition-smooth);
    }

    .sync-dot.synced {
      background: var(--success);
      box-shadow: 0 0 8px rgba(0, 206, 201, 0.5);
    }

    .sync-dot.buffering {
      background: var(--warning);
      box-shadow: 0 0 8px rgba(253, 203, 110, 0.5);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ===== Keyboard Hints ===== */
    .keyboard-hints {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 2px;
      flex-shrink: 0;
    }

    .kbd-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 20px;
      padding: 0 5px;
      border-radius: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* ===== Responsive ===== */
    @media (max-width: 700px) {
      .controls-row {
        flex-wrap: wrap;
        justify-content: center;
      }
      .controls-left, .controls-right {
        flex: 1 1 100%;
        justify-content: center;
      }
      .volume-slider {
        width: 60px;
      }
      .header {
        padding: 8px 16px;
      }
      .app-container {
        padding: 8px 12px 4px;
      }
      .controls-panel {
        padding: 10px 14px;
      }
      .keyboard-hints {
        display: none;
      }
    }

    /* ===== Fullscreen styles ===== */
    .player-wrapper:fullscreen,
    .player-wrapper:-webkit-full-screen,
    .player-area:fullscreen,
    .player-area:-webkit-full-screen {
      border-radius: 0;
      background: #000;
    }

    .player-area:fullscreen .player-wrapper,
    .player-area:-webkit-full-screen .player-wrapper,
    .player-area:fullscreen .presentation-wrapper,
    .player-area:-webkit-full-screen .presentation-wrapper {
      border-radius: 0;
    }

    /* ===== Animations ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .file-inputs, .player-area, .controls-panel, .status-bar, .keyboard-hints {
      animation: fadeIn 0.5s ease-out backwards;
    }

    .player-area { animation-delay: 0.05s; }
    .controls-panel { animation-delay: 0.1s; }
    .status-bar { animation-delay: 0.15s; }
    .keyboard-hints { animation-delay: 0.2s; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all var(--transition-smooth);
      z-index: 1000;
      backdrop-filter: blur(12px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== Footer ===== */
    .footer {
      width: 100%;
      padding: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-top: 1px solid var(--border-subtle);
      background: rgba(10, 10, 15, 0.5);
    }

    .footer-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: var(--transition-smooth);
    }

    .footer-link:hover {
      color: var(--accent-light);
    }

    .github-icon {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header" id="header">
    <div class="logo">
      <div class="logo-icon">▶</div>
      <span data-i18n="appTitle">Lecture Sync</span>
    </div>
    <div class="lang-toggle" id="langToggle" role="button" tabindex="0" aria-label="Switch language">
      <span class="lang-option active" data-lang="en">EN</span>
      <span class="lang-option" data-lang="he">עב</span>
    </div>
  </header>

  <!-- Main -->
  <main class="app-container">

    <!-- File Inputs -->
    <section class="file-inputs" id="fileInputs">
      <div class="file-drop" id="videoDrop">
        <input type="file" id="videoInput" accept="video/*" aria-label="Select video file" />
        <div class="file-icon">🎬</div>
        <span class="file-label" data-i18n="videoLabel">Video File</span>
        <span class="file-hint" data-i18n="videoHint">Click or drag &amp; drop your video MP4</span>
        <span class="file-name" id="videoFileName"></span>
      </div>
      <div class="file-drop" id="audioDrop">
        <input type="file" id="audioInput" accept="audio/*,video/*" aria-label="Select audio/presentation file" />
        <div class="file-icon">📽</div>
        <span class="file-label" data-i18n="audioLabel">Audio / Presentation File</span>
        <span class="file-hint" data-i18n="audioHint">Click or drag &amp; drop your audio or presentation MP4</span>
        <span class="file-name" id="audioFileName"></span>
      </div>
    </section>

    <!-- Player Area (holds both videos side-by-side when presentation is on) -->
    <div class="player-area" id="playerArea">
      <div class="player-wrapper" id="playerWrapper">
        <video id="videoEl" preload="auto" playsinline></video>
        <div class="player-placeholder" id="playerPlaceholder">
          <div class="placeholder-icon">📺</div>
          <div class="placeholder-text" data-i18n="placeholderText">Load both files to begin</div>
        </div>
        <div class="play-overlay" id="playOverlay">
          <div class="play-overlay-btn" id="overlayBtn">▶</div>
        </div>
      </div>
      <div class="resizer" id="resizer"></div>
      <div class="presentation-wrapper" id="presentationWrapper">
        <span class="pres-label" data-i18n="presLabel">Presentation</span>
        <video id="audioEl" preload="auto" playsinline></video>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-panel" id="controlsPanel">
      <!-- Seek -->
      <div class="seek-row">
        <span class="time-display" id="currentTime">0:00</span>
        <div class="seek-bar-container" id="seekContainer">
          <div class="seek-track">
            <div class="seek-buffered" id="seekBuffered"></div>
            <div class="seek-progress" id="seekProgress"></div>
          </div>
          <div class="seek-thumb" id="seekThumb"></div>
        </div>
        <span class="time-display" id="durationDisplay">0:00</span>
      </div>

      <!-- Buttons -->
      <div class="controls-row">
        <div class="controls-left">
          <div class="volume-group">
            <button class="ctrl-btn" id="muteBtn" title="Mute" aria-label="Toggle mute">🔊</button>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="1" aria-label="Volume" />
          </div>
        </div>

        <div class="controls-center">
          <button class="ctrl-btn" id="skipBackBtn" title="Back 10s" aria-label="Skip back 10 seconds">
            ⏪
            <span class="skip-label">10</span>
          </button>
          <button class="ctrl-btn primary" id="playPauseBtn" title="Play / Pause" aria-label="Play or pause">▶</button>
          <button class="ctrl-btn" id="skipForwardBtn" title="Forward 10s" aria-label="Skip forward 10 seconds">
            ⏩
            <span class="skip-label">10</span>
          </button>
        </div>

        <div class="controls-right">
          <button class="toggle-pill-btn" id="audioToggleBtn" data-i18n="audioSrcPres" aria-label="Toggle audio source">Audio: Presentation</button>
          <button class="toggle-pill-btn" id="presToggleBtn" data-i18n="presShow" aria-label="Toggle presentation">Show Presentation</button>
          <div class="rate-group" id="rateGroup">
            <button class="rate-btn active" data-rate="1">1×</button>
            <button class="rate-btn" data-rate="1.25">1.25×</button>
            <button class="rate-btn" data-rate="1.5">1.5×</button>
            <button class="rate-btn" data-rate="1.75">1.75×</button>
            <button class="rate-btn" data-rate="2">2×</button>
          </div>
          <button class="ctrl-btn fullscreen-btn" id="fullscreenBtn" title="Fullscreen" aria-label="Toggle fullscreen">⛶</button>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-bar" id="statusBar">
      <span class="sync-dot" id="syncDot"></span>
      <span id="statusText" data-i18n="statusReady">Ready</span>
    </div>

    <!-- Keyboard Hints -->
    <div class="keyboard-hints">
      <span class="kbd-hint"><kbd>Space</kbd> <span data-i18n="kbdPlayPause">Play / Pause</span></span>
      <span class="kbd-hint"><kbd>←</kbd><kbd>→</kbd> <span data-i18n="kbdSeek">Seek ±10s</span></span>
      <span class="kbd-hint"><kbd>↑</kbd><kbd>↓</kbd> <span data-i18n="kbdVolume">Volume</span></span>
      <span class="kbd-hint"><kbd>M</kbd> <span data-i18n="kbdMute">Mute</span></span>
      <span class="kbd-hint"><kbd>F</kbd> <span data-i18n="kbdFull">Fullscreen</span></span>
      <span class="kbd-hint"><kbd>P</kbd> <span data-i18n="kbdPres">Presentation</span></span>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <a href="https://github.com/Zvimarmor/LectureSync" target="_blank" rel="noopener noreferrer" class="footer-link">
      <svg class="github-icon" viewBox="0 0 16 16" version="1.1" aria-hidden="true">
        <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
      </svg>
      <span>&copy; Zvi Marmor</span>
    </a>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    /* =======================================
       INTERNATIONALIZATION
    ======================================= */
    const i18n = {
      en: {
        appTitle: 'Lecture Sync',
        videoLabel: 'Video File',
        videoHint: 'Click or drag & drop your video MP4',
        audioLabel: 'Audio / Presentation File',
        audioHint: 'Click or drag & drop your audio or presentation MP4',
        placeholderText: 'Load both files to begin',
        statusReady: 'Ready',
        statusSynced: 'Synced & Playing',
        statusPaused: 'Paused',
        statusBuffering: 'Buffering…',
        statusWaiting: 'Waiting for files…',
        toastVideoLoaded: 'Video loaded',
        toastAudioLoaded: 'Audio loaded',
        toastBothLoaded: 'Both files loaded — ready to play!',
        toastSyncCorrection: 'Sync corrected',
        kbdPlayPause: 'Play / Pause',
        kbdSeek: 'Seek ±10s',
        kbdVolume: 'Volume',
        kbdMute: 'Mute',
        kbdFull: 'Fullscreen',
        kbdPres: 'Presentation',
        presShow: 'Show Presentation',
        presHide: 'Hide Presentation',
        presLabel: 'Presentation',
        audioSrcMain: 'Audio: Main Video',
        audioSrcPres: 'Audio: Presentation',
      },
      he: {
        appTitle: 'סנכרון הרצאות',
        videoLabel: 'קובץ וידאו',
        videoHint: 'לחצו או גררו את קובץ הווידאו לכאן',
        audioLabel: 'קובץ שמע / מצגת',
        audioHint: 'לחצו או גררו את קובץ השמע או המצגת לכאן',
        placeholderText: 'טענו את שני הקבצים כדי להתחיל',
        statusReady: 'מוכן',
        statusSynced: 'מסונכרן ומתנגן',
        statusPaused: 'מושהה',
        statusBuffering: 'טוען…',
        statusWaiting: 'ממתין לקבצים…',
        toastVideoLoaded: 'הווידאו נטען',
        toastAudioLoaded: 'השמע נטען',
        toastBothLoaded: 'שני הקבצים נטענו — מוכן לנגן!',
        toastSyncCorrection: 'הסנכרון תוקן',
        kbdPlayPause: 'נגן / השהה',
        kbdSeek: 'דלג ±10 שניות',
        kbdVolume: 'עוצמת שמע',
        kbdMute: 'השתקה',
        kbdFull: 'מסך מלא',
        kbdPres: 'מצגת',
        presShow: 'הצג מצגת',
        presHide: 'הסתר מצגת',
        presLabel: 'מצגת',
        audioSrcMain: 'שמע: וידאו ראשי',
        audioSrcPres: 'שמע: מצגת',
      },
    };

    let currentLang = 'en';

    function setLang(lang) {
      currentLang = lang;
      const html = document.documentElement;
      html.lang = lang;
      html.dir = lang === 'he' ? 'rtl' : 'ltr';
      html.style.fontFamily = lang === 'he' ? 'var(--font-he)' : 'var(--font-en)';

      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
      });

      document.querySelectorAll('.lang-option').forEach((opt) => {
        opt.classList.toggle('active', opt.dataset.lang === lang);
      });

      document.title = i18n[lang].appTitle;
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      setLang(currentLang === 'en' ? 'he' : 'en');
    });

    /* =======================================
       DOM REFS
    ======================================= */
    const videoEl = document.getElementById('videoEl');
    const audioEl = document.getElementById('audioEl');
    const videoInput = document.getElementById('videoInput');
    const audioInput = document.getElementById('audioInput');
    const videoDrop = document.getElementById('videoDrop');
    const audioDrop = document.getElementById('audioDrop');
    const videoFileName = document.getElementById('videoFileName');
    const audioFileName = document.getElementById('audioFileName');
    const playerPlaceholder = document.getElementById('playerPlaceholder');
    const playOverlay = document.getElementById('playOverlay');
    const overlayBtn = document.getElementById('overlayBtn');
    const controlsPanel = document.getElementById('controlsPanel');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const seekContainer = document.getElementById('seekContainer');
    const seekProgress = document.getElementById('seekProgress');
    const seekBuffered = document.getElementById('seekBuffered');
    const seekThumb = document.getElementById('seekThumb');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('durationDisplay');
    const skipBackBtn = document.getElementById('skipBackBtn');
    const skipForwardBtn = document.getElementById('skipForwardBtn');
    const rateGroup = document.getElementById('rateGroup');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const syncDot = document.getElementById('syncDot');
    const statusText = document.getElementById('statusText');
    const playerWrapper = document.getElementById('playerWrapper');
    const playerArea = document.getElementById('playerArea');
    const resizer = document.getElementById('resizer');
    const presentationWrapper = document.getElementById('presentationWrapper');
    const presToggleBtn = document.getElementById('presToggleBtn');
    const audioToggleBtn = document.getElementById('audioToggleBtn');
    const toastEl = document.getElementById('toast');

    /* =======================================
       STATE
    ======================================= */
    let videoLoaded = false;
    let audioLoaded = false;
    let isSeeking = false;
    let currentRate = 1;
    let syncThreshold = 0.15; // seconds tolerance
    let toastTimeout = null;

    /* =======================================
       TOAST
    ======================================= */
    function showToast(key) {
      const msg = i18n[currentLang][key] || key;
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    /* =======================================
       FILE LOADING
    ======================================= */
    function setupDropZone(dropEl, inputEl, mediaEl, isVideo) {
      ['dragenter', 'dragover'].forEach((evt) =>
        dropEl.addEventListener(evt, (e) => {
          e.preventDefault();
          dropEl.classList.add('dragover');
        })
      );

      ['dragleave', 'drop'].forEach((evt) =>
        dropEl.addEventListener(evt, () => dropEl.classList.remove('dragover'))
      );

      dropEl.addEventListener('drop', (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file) loadFile(file, mediaEl, isVideo, dropEl);
      });

      inputEl.addEventListener('change', () => {
        const file = inputEl.files[0];
        if (file) loadFile(file, mediaEl, isVideo, dropEl);
      });
    }

    function loadFile(file, mediaEl, isVideo, dropEl) {
      const url = URL.createObjectURL(file);
      mediaEl.src = url;
      mediaEl.load();

      dropEl.classList.add('loaded');
      const nameEl = isVideo ? videoFileName : audioFileName;
      nameEl.textContent = '✓ ' + file.name;

      if (isVideo) {
        videoLoaded = true;
        showToast('toastVideoLoaded');
      } else {
        audioLoaded = true;
        showToast('toastAudioLoaded');
      }

      if (videoLoaded && audioLoaded) {
        onBothLoaded();
      }
    }

    function onBothLoaded() {
      playerPlaceholder.classList.add('hidden');
      playOverlay.classList.add('visible');
      controlsPanel.classList.add('active');
      showToast('toastBothLoaded');
      setStatus('statusReady', '');

      // Set initial rate
      videoEl.playbackRate = currentRate;
      audioEl.playbackRate = currentRate;

      updateAudioRouting();
    }

    setupDropZone(videoDrop, videoInput, videoEl, true);
    setupDropZone(audioDrop, audioInput, audioEl, false);

    /* =======================================
       FORMAT TIME
    ======================================= */
    function formatTime(s) {
      if (!isFinite(s) || s < 0) return '0:00';
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = Math.floor(s % 60);
      if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
      return `${m}:${String(sec).padStart(2, '0')}`;
    }

    /* =======================================
       STATUS
    ======================================= */
    function setStatus(key, dotState) {
      statusText.textContent = i18n[currentLang][key] || key;
      statusText.setAttribute('data-i18n', key);
      syncDot.className = 'sync-dot' + (dotState ? ' ' + dotState : '');
    }

    /* =======================================
       PLAY / PAUSE
    ======================================= */
    let isPlaying = false;

    async function masterPlay() {
      if (!videoLoaded || !audioLoaded) return;
      try {
        // Sync times before playing
        syncTimes();
        await Promise.all([videoEl.play(), audioEl.play()]);
        isPlaying = true;
        playPauseBtn.textContent = '⏸';
        overlayBtn.textContent = '⏸';
        playOverlay.classList.remove('visible');
        setStatus('statusSynced', 'synced');
      } catch (e) {
        console.warn('Play failed:', e);
      }
    }

    function masterPause() {
      videoEl.pause();
      audioEl.pause();
      isPlaying = false;
      playPauseBtn.textContent = '▶';
      overlayBtn.textContent = '▶';
      playOverlay.classList.add('visible');
      setStatus('statusPaused', '');
    }

    function togglePlay() {
      isPlaying ? masterPause() : masterPlay();
    }

    playPauseBtn.addEventListener('click', togglePlay);
    playOverlay.addEventListener('click', togglePlay);

    /* Click on video to toggle play */
    videoEl.addEventListener('click', togglePlay);

    /* =======================================
       SEEK
    ======================================= */
    function seekTo(time) {
      const duration = getDuration();
      if (!duration) return;
      const t = Math.max(0, Math.min(time, duration));
      videoEl.currentTime = t;
      audioEl.currentTime = t;
      updateSeekUI();
    }

    function getDuration() {
      // Use the shorter of the two to prevent overrun
      const vd = videoEl.duration || 0;
      const ad = audioEl.duration || 0;
      if (vd && ad) return Math.min(vd, ad);
      return vd || ad || 0;
    }

    // Seek bar interaction
    let seekDragging = false;

    function getSeekFraction(e) {
      const rect = seekContainer.getBoundingClientRect();
      const isRtl = document.documentElement.dir === 'rtl';
      let x = (e.clientX || e.touches?.[0]?.clientX || 0) - rect.left;
      if (isRtl) x = rect.width - x;
      return Math.max(0, Math.min(1, x / rect.width));
    }

    seekContainer.addEventListener('mousedown', (e) => {
      seekDragging = true;
      isSeeking = true;
      const frac = getSeekFraction(e);
      seekTo(frac * getDuration());
    });

    document.addEventListener('mousemove', (e) => {
      if (!seekDragging) return;
      const frac = getSeekFraction(e);
      seekTo(frac * getDuration());
    });

    document.addEventListener('mouseup', () => {
      if (seekDragging) {
        seekDragging = false;
        isSeeking = false;
        if (isPlaying) masterPlay();
      }
    });

    // Touch events
    seekContainer.addEventListener('touchstart', (e) => {
      seekDragging = true;
      isSeeking = true;
      const frac = getSeekFraction(e.touches[0]);
      seekTo(frac * getDuration());
    }, { passive: true });

    seekContainer.addEventListener('touchmove', (e) => {
      if (!seekDragging) return;
      const frac = getSeekFraction(e.touches[0]);
      seekTo(frac * getDuration());
    }, { passive: true });

    seekContainer.addEventListener('touchend', () => {
      seekDragging = false;
      isSeeking = false;
      if (isPlaying) masterPlay();
    });

    function updateSeekUI() {
      const duration = getDuration();
      if (!duration) return;
      const progress = videoEl.currentTime / duration;
      seekProgress.style.width = (progress * 100) + '%';
      seekThumb.style.left = (progress * 100) + '%';
      currentTimeEl.textContent = formatTime(videoEl.currentTime);
      durationEl.textContent = formatTime(duration);

      // Buffered
      if (videoEl.buffered.length > 0) {
        const buffEnd = videoEl.buffered.end(videoEl.buffered.length - 1);
        seekBuffered.style.width = ((buffEnd / duration) * 100) + '%';
      }
    }

    /* =======================================
       SKIP
    ======================================= */
    skipBackBtn.addEventListener('click', () => seekTo(videoEl.currentTime - 10));
    skipForwardBtn.addEventListener('click', () => seekTo(videoEl.currentTime + 10));

    /* =======================================
       VOLUME & AUDIO ROUTING
    ======================================= */
    let lastVolume = 1;
    let activeAudioSource = 'audioEl'; // 'audioEl' for presentation, 'videoEl' for main

    function updateAudioRouting() {
      const v = parseFloat(volumeSlider.value);
      if (activeAudioSource === 'audioEl') {
        videoEl.muted = true;
        audioEl.muted = false;
        audioEl.volume = v;
      } else {
        audioEl.muted = true;
        videoEl.muted = false;
        videoEl.volume = v;
      }
      updateMuteIcon();
    }

    function updateVolumeSlider() {
      const pct = parseFloat(volumeSlider.value) * 100;
      volumeSlider.style.background = `linear-gradient(to right, #6c5ce7 ${pct}%, rgba(255, 255, 255, 0.1) ${pct}%)`;
    }

    volumeSlider.addEventListener('input', () => {
      const v = parseFloat(volumeSlider.value);
      if (activeAudioSource === 'audioEl') {
        audioEl.volume = v;
      } else {
        videoEl.volume = v;
      }
      lastVolume = v > 0 ? v : lastVolume;
      updateMuteIcon();
      updateVolumeSlider();
    });

    muteBtn.addEventListener('click', () => {
      const activeEl = activeAudioSource === 'audioEl' ? audioEl : videoEl;
      if (activeEl.volume > 0) {
        lastVolume = activeEl.volume;
        activeEl.volume = 0;
        volumeSlider.value = 0;
      } else {
        activeEl.volume = lastVolume;
        volumeSlider.value = lastVolume;
      }
      updateMuteIcon();
      updateVolumeSlider();
    });

    function updateMuteIcon() {
      const activeEl = activeAudioSource === 'audioEl' ? audioEl : videoEl;
      const v = activeEl.volume;
      if (v === 0) muteBtn.textContent = '🔇';
      else if (v < 0.5) muteBtn.textContent = '🔉';
      else muteBtn.textContent = '🔊';
    }

    // Initialize volume slider fill on load
    updateVolumeSlider();

    /* =======================================
       AUDIO SOURCE TOGGLE
    ======================================= */
    audioToggleBtn.addEventListener('click', () => {
      activeAudioSource = activeAudioSource === 'audioEl' ? 'videoEl' : 'audioEl';
      const key = activeAudioSource === 'audioEl' ? 'audioSrcPres' : 'audioSrcMain';
      audioToggleBtn.textContent = i18n[currentLang][key];
      audioToggleBtn.setAttribute('data-i18n', key);
      updateAudioRouting();
    });

    /* =======================================
       PLAYBACK RATE
    ======================================= */
    rateGroup.addEventListener('click', (e) => {
      const btn = e.target.closest('.rate-btn');
      if (!btn) return;
      currentRate = parseFloat(btn.dataset.rate);
      videoEl.playbackRate = currentRate;
      audioEl.playbackRate = currentRate;
      rateGroup.querySelectorAll('.rate-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
    });

    /* =======================================
       FULLSCREEN
    ======================================= */
    fullscreenBtn.addEventListener('click', () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        playerArea.requestFullscreen?.() || playerArea.webkitRequestFullscreen?.();
      }
    });

    /* =======================================
       PRESENTATION MODE TOGGLE
    ======================================= */
    let presentationVisible = false;

    presToggleBtn.addEventListener('click', () => {
      presentationVisible = !presentationVisible;
      presentationWrapper.classList.toggle('visible', presentationVisible);
      resizer.classList.toggle('visible', presentationVisible);
      presToggleBtn.classList.toggle('active', presentationVisible);
      
      if (!presentationVisible) {
        playerWrapper.style.flex = ''; // Reset sizing when hiding
      }
      
      // Update button text based on state and current language
      const key = presentationVisible ? 'presHide' : 'presShow';
      presToggleBtn.textContent = i18n[currentLang][key];
      presToggleBtn.setAttribute('data-i18n', key);
    });

    // Keyboard shortcut: P to toggle presentation
    // (added in the keydown handler below)

    /* =======================================
       RESIZER LOGIC
    ======================================= */
    let isResizing = false;

    function startResize(e) {
      isResizing = true;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      resizer.classList.add('dragging');
    }

    function doResize(e) {
      if (!isResizing) return;
      const areaRect = playerArea.getBoundingClientRect();
      const isRtl = document.documentElement.dir === 'rtl';
      let clientX = e.touches ? e.touches[0].clientX : e.clientX;
      let offset = clientX - areaRect.left;
      if (isRtl) offset = areaRect.width - offset;
      
      const minW = areaRect.width * 0.15; // 15% min width
      const maxW = areaRect.width * 0.85; // 85% max width
      offset = Math.max(minW, Math.min(offset, maxW));
      
      // Subtracting a few pixels for the resizer itself
      playerWrapper.style.flex = `0 0 ${offset - 3}px`;
    }

    function stopResize() {
      if (isResizing) {
        isResizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        resizer.classList.remove('dragging');
      }
    }

    resizer.addEventListener('mousedown', startResize);
    document.addEventListener('mousemove', doResize);
    document.addEventListener('mouseup', stopResize);

    resizer.addEventListener('touchstart', startResize, { passive: true });
    document.addEventListener('touchmove', doResize, { passive: true });
    document.addEventListener('touchend', stopResize);

    /* =======================================
       STRICT SYNCHRONIZATION
    ======================================= */
    function syncTimes() {
      if (isSeeking) return;
      const diff = Math.abs(videoEl.currentTime - audioEl.currentTime);
      if (diff > syncThreshold) {
        audioEl.currentTime = videoEl.currentTime;
      }
    }

    // Buffering handling: if one element is waiting, pause the other
    let videoWaiting = false;
    let audioWaiting = false;

    function checkBuffering() {
      if (videoWaiting || audioWaiting) {
        if (isPlaying) {
          if (!videoWaiting && !videoEl.paused) videoEl.pause();
          if (!audioWaiting && !audioEl.paused) audioEl.pause();
          setStatus('statusBuffering', 'buffering');
        }
      } else if (isPlaying) {
        // Both ready — resume
        syncTimes();
        if (videoEl.paused) videoEl.play().catch(() => {});
        if (audioEl.paused) audioEl.play().catch(() => {});
        setStatus('statusSynced', 'synced');
      }
    }

    videoEl.addEventListener('waiting', () => { videoWaiting = true; checkBuffering(); });
    videoEl.addEventListener('canplay', () => { videoWaiting = false; checkBuffering(); });
    videoEl.addEventListener('playing', () => { videoWaiting = false; });

    audioEl.addEventListener('waiting', () => { audioWaiting = true; checkBuffering(); });
    audioEl.addEventListener('canplay', () => { audioWaiting = false; checkBuffering(); });
    audioEl.addEventListener('playing', () => { audioWaiting = false; });

    // Periodic sync check
    videoEl.addEventListener('timeupdate', () => {
      if (!isSeeking) {
        updateSeekUI();
        syncTimes();
      }
    });

    // Ended
    videoEl.addEventListener('ended', masterPause);
    audioEl.addEventListener('ended', masterPause);

    // Ensure playback rate stays in sync
    videoEl.addEventListener('ratechange', () => {
      if (audioEl.playbackRate !== videoEl.playbackRate) {
        audioEl.playbackRate = videoEl.playbackRate;
      }
    });

    /* =======================================
       KEYBOARD SHORTCUTS
    ======================================= */
    document.addEventListener('keydown', (e) => {
      // Don't capture if user is in an input
      if (e.target.tagName === 'INPUT' && e.target.type !== 'range') return;

      switch (e.code) {
        case 'Space':
          e.preventDefault();
          togglePlay();
          break;
        case 'ArrowLeft':
          e.preventDefault();
          seekTo(videoEl.currentTime - 10);
          break;
        case 'ArrowRight':
          e.preventDefault();
          seekTo(videoEl.currentTime + 10);
          break;
        case 'ArrowUp':
          e.preventDefault();
          volumeSlider.value = Math.min(1, parseFloat(volumeSlider.value) + 0.05);
          volumeSlider.dispatchEvent(new Event('input'));
          break;
        case 'ArrowDown':
          e.preventDefault();
          volumeSlider.value = Math.max(0, parseFloat(volumeSlider.value) - 0.05);
          volumeSlider.dispatchEvent(new Event('input'));
          break;
        case 'KeyM':
          muteBtn.click();
          break;
        case 'KeyF':
          fullscreenBtn.click();
          break;
        case 'KeyP':
          presToggleBtn.click();
          break;
      }
    });

    /* =======================================
       ANIMATION FRAME LOOP (high-precision sync)
    ======================================= */
    function animationLoop() {
      if (isPlaying && !isSeeking) {
        const diff = Math.abs(videoEl.currentTime - audioEl.currentTime);
        if (diff > syncThreshold) {
          audioEl.currentTime = videoEl.currentTime;
        }
        updateSeekUI();
      }
      requestAnimationFrame(animationLoop);
    }
    requestAnimationFrame(animationLoop);

  </script>
</body>
</html>
